name: Harvest RSS

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  RETENTION_DAYS: "10"

jobs:
  harvest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download latest release binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo "$GITHUB_REPOSITORY" --pattern "cyber-news-feed-linux-amd64" --output cyber-news-feed --clobber
          chmod +x cyber-news-feed

      - name: Run harvester
        run: ./cyber-news-feed

      - name: Commit RSS data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/rss
          if git diff --cached --quiet; then
            echo "No RSS data changes"
          else
            git commit -m "Update RSS data"
            git push
          fi
