name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true
          cache: true

      - name: Test
        run: go test ./...

      - name: Build Linux binary
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/cyber-news-feed-linux-amd64 .

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/cyber-news-feed-linux-amd64 \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes "Release $GITHUB_REF_NAME"
